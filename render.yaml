services:
  - type: web
    name: stepnow-backend
    runtime: python
    region: ohio
    plan: starter
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v0/public/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: ENVIRONMENT
        value: staging
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
